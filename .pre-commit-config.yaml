# Pre-commit hooks. Install once with:  pre-commit install
# Run on all files with:                 pre-commit run --all-files
#
# Keeping lint/format/type checks at commit time means CI (and reviewers)
# rarely see trivial style noise.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff           # lint (with --fix)
        args: [--fix]
      - id: ruff-format    # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.7]
        # Type-check the package + scripts only; notebooks are out of scope.
        files: ^(src|scripts)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
      - id: check-merge-conflict
