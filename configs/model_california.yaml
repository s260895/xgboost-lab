# Regression model config for California Housing (Stage 2).
# Loaded into xgblearn.config.ModelConfig.

objective: reg:squarederror   # squared error -> g = F - y, h = 1 (knowledge/03)
eval_metric: [rmse, mae]      # rmse drives early stopping (last metric)

device: cuda                  # set to "cpu" on a CPU-only box
tree_method: hist

num_boost_round: 1000         # high ceiling; early stopping finds the real count
early_stopping_rounds: 50
enable_categorical: false     # all 8 features are numeric

seed: 42

params:
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 5.0
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0.0
  reg_alpha: 0.0
  reg_lambda: 1.0
