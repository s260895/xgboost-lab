# Tuned model config. Same schema as model_baseline.yaml.
# Placeholder values — Stage 5 (Optuna) writes the best params found here.
# Convention from the spec: once a good learning_rate is found, LOWER it and
# refit with more trees for the final model.

objective: binary:logistic
eval_metric: [logloss, auc]

device: cuda
tree_method: hist

num_boost_round: 2000         # more trees to pair with the lower learning_rate
early_stopping_rounds: 100
enable_categorical: false

seed: 42

params:
  learning_rate: 0.03         # lowered vs. baseline (0.1)
  max_depth: 5
  min_child_weight: 2.0
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0.0
  reg_alpha: 0.001
  reg_lambda: 1.5
