# Optuna study config. Loaded into xgblearn.config.TuningConfig (Stage 5).
# Search ranges follow the spec's recommended starting points (§8).

n_trials: 50
timeout: null                 # seconds; null = no time limit
direction: minimize           # minimizing validation logloss
metric: validation-logloss    # Optuna observation key (eval_set index + metric)

sampler: tpe                  # Bayesian TPE (default; better than grid for XGBoost)
pruner: median                # prune unpromising trials early
seed: 42

# Free-form search space consumed by the Stage 5 tuner. Each entry names the
# Optuna suggestion type and its bounds. n_estimators is intentionally absent:
# fix a high num_boost_round + early stopping instead of tuning tree count.
search_space:
  learning_rate:    { type: loguniform, low: 0.01,  high: 0.3 }
  max_depth:        { type: int,        low: 3,     high: 10 }
  min_child_weight: { type: loguniform, low: 1.0,   high: 10.0 }
  gamma:            { type: uniform,    low: 0.0,   high: 5.0 }
  subsample:        { type: uniform,    low: 0.5,   high: 1.0 }
  colsample_bytree: { type: uniform,    low: 0.5,   high: 1.0 }
  reg_alpha:        { type: loguniform, low: 1.0e-3, high: 10.0 }
  reg_lambda:       { type: loguniform, low: 1.0e-3, high: 10.0 }
